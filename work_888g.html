        <div id="work-wrap">
            <div id="work-inner">
                <!-- ★ 사진 추가 시: 아래 div.slide 블록을 복사해서 src 경로만 바꿔 붙여넣기 -->
                <!-- ★ 사진 삭제 시: 해당 div.slide 블록 전체 삭제 -->
                <!-- ★ 첫 번째 사진은 class="slide active" 유지, 나머지는 class="slide" -->
                <!-- ★ 추가/삭제 후 슬라이더 카운터 숫자(아래 01 / XX)도 맞게 수정 -->
                <div class="slide active"><img src="./img/photo/888g/888g01.jpg"></div>
                <div class="slide"><img loading="lazy" src="./img/photo/888g/888g02.jpg"></div>
                <div class="slide"><img loading="lazy" src="./img/photo/888g/888g03.jpg"></div>
                <div class="slide"><img loading="lazy" src="./img/photo/888g/888g04.jpg"></div>
            </div>
            <div class="slider-controls">
                <button class="slider-btn" id="prevBtn">←</button>
                <!-- ★ 사진 추가/삭제 시 여기 숫자(04) 맞게 수정 -->
                <span class="slider-counter" id="counter">01 / 04</span>
                <button class="slider-btn" id="nextBtn">→</button>
            </div>
        </div>
    </main>
</div>
<script>
    const slides = document.querySelectorAll('.slide');
    const counter = document.getElementById('counter');
    const total = slides.length;
    let current = 0;
    function showSlide(n) {
        slides[current].classList.remove('active');
        current = (n + total) % total;
        slides[current].classList.add('active');
        counter.textContent = String(current + 1).padStart(2, '0') + ' / ' + String(total).padStart(2, '0');
    }
    document.getElementById('prevBtn').addEventListener('click', () => showSlide(current - 1));
    document.getElementById('nextBtn').addEventListener('click', () => showSlide(current + 1));
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') showSlide(current - 1);
        if (e.key === 'ArrowRight') showSlide(current + 1);
    });
</script>
<script src="js/main.js"></script>
